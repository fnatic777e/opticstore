<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Optic Store</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">Optic Store</div>
  <div class="cart-btn" onclick="openCart()">🛒 <span id="cart-count">0</span></div>
</header>

<!-- MENU ФИЛЬТРА -->
<div class="menu">
  <button onclick="filterProducts('all', event)" class="active">Все</button>
  <button onclick="filterProducts('men', event)">Мужские</button>
  <button onclick="filterProducts('women', event)">Женские</button>
</div>

<!-- КАТАЛОГ -->
<div class="products" id="products"></div>

<!-- МОДАЛКА ТОВАРА -->
<div class="modal" id="productModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">✕</span>
    <div class="carousel">
      <button onclick="prevImage()">‹</button>
      <img id="modalImage">
      <button onclick="nextImage()">›</button>
    </div>
    <p id="imageCounter"></p>
    <h2 id="modalTitle"></h2>
    <p id="modalPrice"></p>
    <button onclick="addToCart()">В корзину</button>
    <button onclick="orderNow()">Заказать</button>
  </div>
</div>

<!-- КОРЗИНА -->
<div class="modal" id="cartModal">
  <div class="modal-content">
    <span class="close" onclick="closeCart()">✕</span>
    <h2>Корзина</h2>
    <div id="cartItems"></div>
    <p id="totalPrice"></p>
    <button onclick="checkout()">Оформить заказ</button>
  </div>
</div>

<!-- Telegram WebApp -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="script.js"></script>

</body>
</html>
